<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d0d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Journal">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Journal de La Fouchardière</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="main-header">
      <div class="header-top">
        <div class="header-date" id="header-date"></div>
        <h1 class="masthead">Journal de La Fouchardière</h1>
        <div class="header-edition">Édition numérique</div>
        <button id="sw-update-btn" onclick="forceUpdate()" title="Mettre à jour">↻ Mettre à jour</button>
      </div>
      <nav class="cat-nav" id="cat-nav"></nav>
    </header>

    <main id="main-content"></main>

    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-btn active" data-view="home">
        <span class="nav-icon">&#128240;</span>
        <span>Accueil</span>
      </button>
      <button class="nav-btn" data-view="search">
        <span class="nav-icon">&#128269;</span>
        <span>Recherche</span>
      </button>
      <button class="nav-btn" data-view="saved">
        <span class="nav-icon">&#128278;</span>
        <span>Sauvegardés</span>
      </button>
      <button class="nav-btn" data-view="settings">
        <span class="nav-icon">&#9881;</span>
        <span>Réglages</span>
      </button>
    </nav>
  </div>

  <div id="article-overlay" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
